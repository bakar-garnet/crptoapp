name: Garnet Deep Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  garnet-deep-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Garnet Monitor Init
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Run all npm scripts
        run: |
          if [ -f package.json ]; then
            for script in $(jq -r '.scripts | keys[]' package.json); do
              echo "Running script: $script"
              npm run "$script" || true
            done
          fi
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          if [ -d python ]; then
            find python -maxdepth 2 -type f -name "requirements*.txt" -print -exec pip install -r {} \; || true
          fi
        continue-on-error: true

      - name: Run Python files
        run: |
          find python -type f -name "*.py" | while read f; do
            echo "Running $f"
            python "$f" || true
          done
        continue-on-error: true

      - name: Run Hardhat tests
        run: |
          npx hardhat test || true
        continue-on-error: true

      - name: Run extra JS scripts
        run: |
          find scripts tools test -type f \( -name "*.js" -o -name "*.mjs" \) | while read f; do
            echo "Running $f"
            node "$f" || true
          done
        continue-on-error: true

      - name: Trace summary
        run: |
          echo "Garnet run complete."
